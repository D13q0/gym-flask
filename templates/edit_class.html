<h1> Editar clase</h1>

<form action="/update_class" method="POST">
    <input type="hidden" name="id" value="{{ clase.id }}">
    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" name="name" value="{{ clase.name }}"><br><br>
    </div>
    <div class="mb-3">
        <label class="form-label">Capacidad</label>
        <input type="number" name="capacity" value="{{ clase.capacity }}"><br><br>
    </div>
    <div class="mb-3">
        <label class="form-label">Fecha y Hora</label>
        <input type="datetime-local" name="schedule"><br><br>
    </div>
    <button type="submit">Actualizar</button>

</form>
