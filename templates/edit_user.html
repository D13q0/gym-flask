<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.min.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-primary " data-bs-theme="dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Gym XXXX</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="/admin">Return</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <h2 class="text-center mb-4">Editar Usuario</h2>

    <form action="/update_user" method="POST">
        <input type="hidden" name="id" value="{{user.id}}">

        <div class="mb-3 text-center">
            <label>Nombre</label>
            <input type="text" name="name" value="{{user.name}}" class="form-control w-50 mx-auto">
        </div>

        <div class="mb-3 text-center">
            <label>Email</label>
            <input type="email" name="email" value="{{user.email}}" class="form-control w-50 mx-auto">
        </div>

        <div class="mb-3 text-center">
            <label>Rol</label>
            <input type="text" name="role" value="{{user.role}}" class="form-control w-50 mx-auto">
        </div>
        <div class="mb-3 text-center">
        <input type="password" name="password" value="{{user.password}}" class="form-control w-50 mx-auto">
    </div>

        <div class="text-center">
            <button class="btn btn-primary">Actualizar</button>
        </div>
    </form>
</div>

</body>
</html>
